<section class="auth-container">
  <div class="auth-card">
    <h2>{{ loginMode ? 'Login' : 'Sign Up' }}</h2>
    <app-alert [message]="error" *ngIf="error" (close)="onClosed()"></app-alert>
    <div *ngIf="isLoading" class="text-center">
      <app-loading-spinner></app-loading-spinner>
    </div>
    <form #authForm="ngForm" (ngSubmit)="onAuthSubmit(authForm)" *ngIf="!isLoading">
      <div class="form-group">
        <label for="email">{{ gmailLogin ? 'Enter your Gmail Id' : 'User Email' }}</label>
        <input type="email" id="email" name="email" class="form-control" ngModel required email>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" ngModel required minlength="6">
      </div>
      <div class="form-group">
        <button class="btn btn-primary btn-block" type="submit" [disabled]="!authForm.valid">{{ loginMode ? 'Login' : 'Sign Up' }}</button>
      </div>
      <div class="form-group">
        <button class="btn btn-secondary btn-block" type="button" (click)="onSwitchMode()">Switch To {{ loginMode ? 'Sign Up' : 'Login' }}</button>
      </div>
                <!-- <div class="form-group">
                  <a (click)="gmailLogin = true"> Sign In </a> here using your Gmail account
                </div> -->
    </form>
  </div>
</section>
